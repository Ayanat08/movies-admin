<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>Movies Admin Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-page" class="page" style="display: flex;">
        <div class="login-box">
            <h2>Жүйеге кіру</h2>
            <form id="login-form">
                <input type="text" id="username" placeholder="Логин" required>
                <input type="password" id="password" placeholder="Құпия сөз" required>
                <button type="submit">Кіру</button>
            </form>
        </div>
    </div>

    <div id="main-layout" class="page" style="display: none;">
        <header>
            <div class="logo">Movies Admin Panel</div>
            <div class="nav-buttons">
                <button onclick="switchPage('genres-section')">Жанрлар</button>
                <button onclick="switchPage('movies-section')">Фильмдер</button>
                <button onclick="logout()" class="logout-btn">Шығу</button>
            </div>
        </header>

        <main class="content">
            <section id="genres-section" class="sub-page">
                <h3>Жанрларды басқару</h3>
                <form id="genre-form" style="display: none;">
                    <input type="text" id="genre-name" required>
                    <input type="text" id="genre-desc">
                    <button type="submit">Сақтау</button>
                </form>
                <table id="genres-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Атауы</th>
                            <th>Сипаттамасы</th>
                            <th>Әрекеттер</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </section>

            <section id="movies-section" class="sub-page" style="display:none;">
                <h3>Фильмдерді басқару</h3>

                <div class="filters">
                    <input type="text" id="search-title" placeholder="Атауы бойынша іздеу..." oninput="filterMovies()">
                    <select id="filter-genre" onchange="filterMovies()">
                        <option value="">Барлық жанрлар</option>
                    </select>
                    <input type="number" id="year-from" placeholder="Жылы" oninput="filterMovies()">
                    <input type="number" id="year-to" placeholder="Жылы" oninput="filterMovies()">
                </div>

                <table id="movies-table">
                    <thead>
                        <tr>
                            <th>Постер</th>
                            <th>Фильм атауы мен сипаттамасы</th>
                            <th>Трейлер</th> <th>Жанры</th>
                            <th>Шыққан жылы</th>
                            <th>Әрекеттер</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </section>
        </main>
    </div>

    <script>
        let allMovies = [];

        async function checkSession() {
            try {
                const res = await fetch('/api/auth/me');
                const data = await res.json();
                if (data.authorized) showMainLayout();
                else showAuthPage();
            } catch (error) { showAuthPage(); }
        }

        function showMainLayout() {
            document.getElementById('auth-page').style.display = 'none';
            document.getElementById('main-layout').style.display = 'flex';
            switchPage('movies-section');
        }

        function showAuthPage() {
            document.getElementById('auth-page').style.display = 'flex';
            document.getElementById('main-layout').style.display = 'none';
        }

        function switchPage(sectionId) {
            document.querySelectorAll('.sub-page').forEach(sec => sec.style.display = 'none');
            document.getElementById(sectionId).style.display = 'block';
            if (sectionId === 'genres-section') loadGenres();
            if (sectionId === 'movies-section') { loadGenresForSelect(); loadMovies(); }
        }

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            if (res.ok) showMainLayout();
            else alert('Қате логин немесе құпия сөз!');
        };

        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            showAuthPage();
            window.location.href = window.location.origin;
        }

        async function loadGenres() {
            const res = await fetch('/api/genres');
            const genres = await res.json();
            const tbody = document.querySelector('#genres-table tbody');
            tbody.innerHTML = genres.map(g => `
                <tr>
                    <td>${g.id}</td>
                    <td><b>${g.name}</b></td>
                    <td>${g.description || ''}</td>
                    <td><button class="btn-del" onclick="deleteGenre(${g.id})">Жою</button></td>
                </tr>
            `).join('');
        }

        async function loadGenresForSelect() {
            const res = await fetch('/api/genres');
            const genres = await res.json();
            const filterSelect = document.getElementById('filter-genre');
            filterSelect.innerHTML = '<option value="">Барлық жанрлар</option>' + genres.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
        }

        async function loadMovies() {
            const res = await fetch('/api/movies');
            allMovies = await res.json();
            renderMovies(allMovies);
        }


        function renderMovies(movies) {
            const tbody = document.querySelector('#movies-table tbody');
            tbody.innerHTML = movies.map(m => `
                <tr>
                    <td><img src="${m.poster_path}" class="thumb"></td>
                    <td>
                        <div style="font-weight: bold; font-size: 16px; margin-bottom: 5px; color: #fff;">${m.title}</div>
                        <div style="color: #888; font-size: 14px;">${m.description || ''}</div>
                    </td>
                    <td>
                        <video src="${m.trailer_path}" controls preload="none" style="width: 130px; height: 75px; background: #000; border-radius: 4px; border: 1px solid #333;"></video>
                    </td>
                    <td><span style="color: #e50914;">${m.genre_name}</span></td>
                    <td>${m.release_year}</td>
                    <td><button class="btn-del" onclick="deleteMovie(${m.id})">Жою</button></td>
                </tr>
            `).join('');
        }

        async function deleteMovie(id) {
            if (confirm('Өшіруді растайсыз ба?')) {
                await fetch(`/api/movies/${id}`, { method: 'DELETE' });
                loadMovies();
            }
        }


        function filterMovies() {
            const titleVal = document.getElementById('search-title').value.toLowerCase();
            const genreVal = document.getElementById('filter-genre').value;
            const yearFrom = parseInt(document.getElementById('year-from').value) || 0;
            const yearTo = parseInt(document.getElementById('year-to').value) || 9999;

            const filtered = allMovies.filter(m => {
                const matchTitle = m.title.toLowerCase().includes(titleVal) || (m.description && m.description.toLowerCase().includes(titleVal));
                const matchGenre = genreVal === "" || m.genre_id == genreVal;
                const matchYear = m.release_year >= yearFrom && m.release_year <= yearTo;
                return matchTitle && matchGenre && matchYear;
            });
            renderMovies(filtered);
        }

        checkSession();
    </script>
</body>
</html>
